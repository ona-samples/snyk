name: fix-snyk-issue
description: >-
  Runs a Snyk security scan, picks the highest-severity open vulnerability,
  applies a fix, verifies tests pass, and opens a pull request.
triggers:
  - context:
      projects: {}
    manual: {}
action:
  limits:
    maxParallel: 1
    maxTotal: 10
  steps:
    # Step 1: Install Snyk CLI if not present
    - task:
        command: |
          command -v snyk && exit 0
          curl -sL https://static.snyk.io/cli/latest/snyk-linux -o /usr/local/bin/snyk
          chmod +x /usr/local/bin/snyk

    # Step 2: Run Snyk test and capture the highest-severity vulnerability
    - task:
        command: |
          cd "$GITPOD_REPO_ROOT"
          snyk test --json --severity-threshold=low > /tmp/snyk-results.json 2>/dev/null || true
          cat /tmp/snyk-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          vulns = data.get('vulnerabilities', [])
          if not vulns:
              print('NO_VULN')
              sys.exit(0)
          severity_order = {'critical': 4, 'high': 3, 'medium': 2, 'low': 1}
          vulns.sort(key=lambda v: severity_order.get(v.get('severity', 'low'), 0), reverse=True)
          top = vulns[0]
          result = {
              'id': top.get('id'),
              'title': top.get('title'),
              'severity': top.get('severity'),
              'packageName': top.get('packageName'),
              'version': top.get('version'),
              'from': top.get('from'),
              'fixedIn': top.get('fixedIn', []),
              'description': top.get('description', '')[:500],
              'language': top.get('language'),
              'packageManager': top.get('packageManager'),
              'moduleName': top.get('moduleName'),
              'upgradePath': top.get('upgradePath', [])
          }
          json.dump(result, sys.stdout, indent=2)
          " > /tmp/snyk-top-vuln.json
          cat /tmp/snyk-top-vuln.json

    - agent:
        prompt: |
          Read /tmp/snyk-top-vuln.json which contains the highest-severity Snyk
          vulnerability. Extract the vulnerability ID, title, severity, package name,
          current version, fixed-in versions, upgrade path, and description.

          If the file contains "NO_VULN" or is empty, output
          "NO_VULN: No Snyk vulnerabilities found." and stop.

          Determine the fix strategy:
          - **Direct dependency with a fix available (fixedIn is non-empty):**
            Upgrade the dependency to the minimum fixed version. For Maven projects,
            update the version in `pom.xml`. For Gradle, update `build.gradle`.
          - **Transitive dependency:** Follow the upgradePath to find the direct
            dependency that needs upgrading. Update that direct dependency version.
          - **No fix available:** If no fixedIn version exists and no upgrade path
            is viable, output "NO_FIX: <vuln-id> in <package>@<version> has no
            available fix." and stop.

          Apply the version change in the appropriate build file. Do NOT commit or
          run tests yet.

    - agent:
        prompt: |
          Verify the fix from the previous step:

          1. Identify the project's build tool (Maven or Gradle) from the repo
             config files.
          2. Compile the project. If it fails, read the errors, fix them, and retry.
          3. Find all test suites and verification commands that could exercise the
             modified code. Run them.
          4. If any check fails, determine whether the failure is caused by your
             change or is pre-existing. Fix what you broke and rerun.
          5. Repeat until all checks pass.

    - pullRequest:
        branch: snyk-fix/
        title: 'Snyk-Fix: '
        description: |
          ## Snyk Vulnerability

          | Field | Value |
          |-------|-------|
          | **Vulnerability** | `<vuln-id>` |
          | **Severity** | <severity> |
          | **Package** | `<package-name>@<current-version>` |
          | **Fixed In** | `<fixed-version>` |
          | **Title** | <vuln-title> |

          ## What changed

          <one-or-two-sentence explanation of the dependency upgrade and why it resolves the vulnerability>

          ## Verification

          <List each build, test, and lint command that was run and its outcome.>
