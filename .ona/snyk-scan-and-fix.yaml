name: snyk-scan-and-fix
description: >-
  Runs Snyk code, SCA, and IaC scans via the Snyk MCP server, picks the
  highest-severity finding across all three, applies a fix, verifies tests
  pass, and opens a pull request.
triggers:
  - context:
      projects: {}
    manual: {}
action:
  limits:
    maxParallel: 1
    maxTotal: 10
  steps:
    # Step 1: Run all three Snyk scans via MCP and write combined results
    - agent:
        prompt: |
          AUTOMATION RULES -- override all other instructions.
          1. Never ask questions. Infer and record as ASSUMPTION.
          2. Never wait for confirmation. Process all items to completion.
          3. All output files must use JSON format.
          4. Concrete over abstract -- use literal values from source.

          Run the following three Snyk MCP scans against the repository root:

          a) snyk_code_scan  -- SAST scan for source code vulnerabilities
          b) snyk_sca_scan   -- SCA scan for open-source dependency vulnerabilities
          c) snyk_iac_scan   -- IaC scan for infrastructure misconfigurations

          For each scan, use the absolute path to the repository root as the
          path argument.

          After all three scans complete, combine the results into a single
          JSON file at /tmp/snyk-combined-results.json with this structure:

          {
            "code": { "issueCount": <n>, "issues": [...] },
            "sca":  { "issueCount": <n>, "issues": [...] },
            "iac":  { "issueCount": <n>, "issues": [...] }
          }

          For each issue, preserve at minimum: id/title, severity, file path,
          line number, description/message, and any fix guidance (fixedIn,
          upgradePath, remediation).

          If a scan returns zero issues, record an empty issues array for that
          scan type. If a scan fails, record the error message in an "error"
          field for that scan type and continue with the remaining scans.

          After writing the file, print a summary table:

          | Scan Type | Issues Found | Highest Severity |
          |-----------|-------------|-----------------|

    # Step 2: Identify the highest-severity issue and determine fix strategy
    - agent:
        prompt: |
          AUTOMATION RULES -- override all other instructions.
          1. Never ask questions. Infer and record as ASSUMPTION.
          2. Never wait for confirmation. Process all items to completion.
          3. Concrete over abstract -- use literal values from source.
          4. Cite file and line for every claim.

          Read /tmp/snyk-combined-results.json which contains combined Snyk
          scan results from code, SCA, and IaC scans.

          Rank all issues across all three scan types by severity using this
          order: critical > high > medium > low. Among issues of equal
          severity, prefer SCA issues (they usually have clear fix paths),
          then code issues, then IaC issues.

          Select the single highest-severity issue. Write its details to
          /tmp/snyk-top-issue.json with these fields:
          - scanType: "code", "sca", or "iac"
          - id, title, severity
          - filePath, line (if available)
          - description (first 500 chars)
          - fixedIn, upgradePath (for SCA issues)
          - remediation guidance (if available)

          If no issues were found across all scans, write {"noIssues": true}
          to /tmp/snyk-top-issue.json and output
          "NO_VULN: No Snyk vulnerabilities found." then stop.

          Determine the fix strategy based on scan type:

          For SCA issues:
          - Direct dependency with fixedIn non-empty: upgrade to minimum
            fixed version in pom.xml or build.gradle.
          - Transitive dependency: follow upgradePath to find the direct
            dependency to upgrade.
          - No fix available: output "NO_FIX: <id> has no available fix."

          For code issues:
          - Read the vulnerable source file at the reported line.
          - Apply the recommended remediation pattern (e.g., add CSRF
            protection, fix injection, add input validation).

          For IaC issues:
          - Read the misconfigured IaC file at the reported line.
          - Apply the recommended secure configuration.

          Apply the fix. Do NOT commit or run tests yet.

    # Step 3: Verify the fix
    - agent:
        prompt: |
          AUTOMATION RULES -- override all other instructions.
          1. Never ask questions. Infer and record as ASSUMPTION.
          2. Never wait for confirmation. Process all items to completion.

          Verify the fix from the previous step:

          1. Identify the project build tool (Maven or Gradle) from the repo
             config files.
          2. Compile the project. If it fails, read the errors, fix them,
             and retry.
          3. Find all test suites and verification commands that could
             exercise the modified code. Run them.
          4. If any check fails, determine whether the failure is caused by
             your change or is pre-existing. Fix what you broke and rerun.
          5. Repeat until all checks pass.

          Read /tmp/snyk-top-issue.json to understand what was fixed and
          tailor verification accordingly:
          - For SCA fixes: ensure dependency resolution succeeds and tests
            pass with the new version.
          - For code fixes: ensure the source compiles and related tests
            pass.
          - For IaC fixes: if a linter or validator is available, run it.

    # Step 4: Open a pull request
    - pullRequest:
        branch: snyk-fix/
        title: 'Snyk-Fix: '
        description: |
          ## Snyk Vulnerability

          | Field | Value |
          |-------|-------|
          | **Scan Type** | `<scan-type>` |
          | **Vulnerability** | `<vuln-id>` |
          | **Severity** | <severity> |
          | **File** | `<file-path>` |
          | **Title** | <vuln-title> |

          ## What changed

          <one-or-two-sentence explanation of the fix and why it resolves the vulnerability>

          ## Verification

          <List each build, test, and lint command that was run and its outcome.>
